<!DOCTYPE html>
<html>
<head>

<title>FitBuddy AI</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Roboto',sans-serif;
background-image:url("/static/images/gym-bg.jpg");
background-size:cover;
background-position:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:12px;
width:350px;
color:white;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#28a745;
border:none;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#218838;
}

@media(max-width:600px){
.container{
width:90%;
}
}

</style>

</head>

<body>

<div class="container">

<h1>FitBuddy</h1>

<form action="/generate-workout" method="post">

<label>Username</label>
<input type="text" name="username" required>

<label>User ID</label>
<input type="text" name="user_id" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Weight (kg)</label>
<input type="number" name="weight" required>

<label>Fitness Goal</label>
<select name="goal">
<option>Weight Loss</option>
<option>Muscle Gain</option>
<option>General Fitness</option>
</select>

<label>Workout Intensity</label>
<select name="intensity">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button type="submit">Generate Workout Plan</button>

</form>

</div>

</body>
</html>
